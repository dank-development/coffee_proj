services:
  nginx_ws:
    image: nginx:latest
    container_name: coffee_app
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - 6769:80
    command: nginx -g 'daemon off;'
    entrypoint: /docker-entrypoint.sh

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - 3003:3000
    restart: unless-stopped
