name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy build files
        run: |
          mkdir -p ~/node-app
          cp -r ./dist/* ~/node-app
          
      - name: Restart Docker container
        run: |
          cd ~/docker_compose/nginx_ws
          docker compose down
          docker compose up -d
